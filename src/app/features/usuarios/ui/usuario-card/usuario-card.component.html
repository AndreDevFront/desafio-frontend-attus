<article class="card" [attr.aria-label]="'Usuário ' + usuario.nome">

  <!-- Avatar -->
  <div class="avatar" [style.background]="bgAvatar">
    {{ inicial }}
  </div>

  <!-- Info -->
  <div class="info">
    <span class="nome">{{ usuario.nome }}</span>
    <span class="email">
      <mat-icon class="info-icon">mail_outline</mat-icon>
      {{ usuario.email }}
    </span>
    <span class="telefone">
      <mat-icon class="info-icon" [style.color]="bgTipo">{{ tipoIcon }}</mat-icon>
      <span class="chip" [style.background]="bgTipoLight" [style.color]="bgTipo">
        {{ usuario.tipoTelefone | titlecase }}
      </span>
      {{ usuario.telefone }}
    </span>
  </div>

  <!-- Ações -->
  <div class="acoes">
    <button
      mat-icon-button
      class="btn-editar"
      (click)="editar()"
      aria-label="Editar usuário"
      matTooltip="Editar usuário"
    >
      <mat-icon>edit</mat-icon>
    </button>

    <button
      mat-icon-button
      class="btn-deletar"
      (click)="confirmarDelecao()"
      aria-label="Excluir usuário"
      matTooltip="Excluir usuário"
      [disabled]="deletando()"
    >
      <mat-icon>{{ deletando() ? 'hourglass_empty' : 'delete_outline' }}</mat-icon>
    </button>
  </div>
</article>
